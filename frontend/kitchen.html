<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocina - Taquería Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/kitchen.css">

    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered'))
            .catch(err => console.log('SW failed', err));
        }
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
        function toggleTheme() {
            if (document.documentElement.classList.contains('dark-mode')) {
                document.documentElement.classList.remove('dark-mode');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark-mode');
                localStorage.setItem('theme', 'dark');
            }
        }
    </script>

</head>
<body>

<div class="container-fluid py-4">
    <header class="d-flex justify-content-between align-items-center mb-4 border-bottom border-secondary pb-3">
        <h2 class="fw-bold m-0 text-warning">🌮 PANTALLA DE COCINA</h2>
        <div>
            <button class="btn btn-outline-info me-3" onclick="document.getElementById('prod-modal').style.display='flex'">Registro de Producción</button>
            <span class="text-secondary" id="last-update">Actualizando...</span>
        </div>
    </header>
    
    <div id="kitchen-grid" class="row g-4">
        <!-- Tickets renderizados aquí -->
    </div>
</div>

<!-- Production Modal -->
<div id="prod-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; align-items:center; justify-content:center;">
    <div style="background:#1e1e1e; padding:30px; border-radius:15px; width:400px; color:#fff; position:relative;">
        <button onclick="document.getElementById('prod-modal').style.display='none'" style="position:absolute; top:10px; right:15px; background:none; border:none; color:#fff; font-size:20px;">&times;</button>
        <h4 class="mb-4">Registro de Producción</h4>
        
        <div id="prod-start-panel">
            <input type="password" id="prod-pin" class="form-control mb-3" placeholder="Ingresa tu PIN">
            <select id="prod-process" class="form-select mb-3">
                <option value="Preparar Masa">Preparar Masa</option>
                <option value="Picar Carne">Picar Carne</option>
                <option value="Hacer Salsas">Hacer Salsas</option>
                <option value="Cocinar Pastor">Cocinar Pastor</option>
            </select>
            <button class="btn btn-primary w-100" onclick="startProduction()">Iniciar Proceso</button>
        </div>
        
        <div id="prod-end-panel" style="display:none;">
            <div class="alert alert-info">Proceso en curso...</div>
            <input type="number" id="prod-qty" class="form-control mb-3" placeholder="Cantidad producida (lotes/kilos)">
            <button class="btn btn-success w-100" onclick="endProduction()">Finalizar Proceso</button>
        </div>
    </div>
</div>

<script>
    let currentProdPin = "";
    async function startProduction() {
        const pin = document.getElementById('prod-pin').value;
        const process = document.getElementById('prod-process').value;
        if(!pin) return alert("PIN requerido");
        
        try {
            const res = await fetch('/api/production/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({pin: pin, process_name: process})
            });
            if(res.ok) {
                currentProdPin = pin;
                document.getElementById('prod-start-panel').style.display = 'none';
                document.getElementById('prod-end-panel').style.display = 'block';
            } else {
                alert("Error o PIN inválido");
            }
        } catch(e) {}
    }
    
    async function endProduction() {
        const qty = parseInt(document.getElementById('prod-qty').value) || 1;
        try {
            const res = await fetch('/api/production/end', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({pin: currentProdPin, qty: qty})
            });
            if(res.ok) {
                alert("Proceso registrado con éxito");
                document.getElementById('prod-modal').style.display = 'none';
                document.getElementById('prod-start-panel').style.display = 'block';
                document.getElementById('prod-end-panel').style.display = 'none';
                document.getElementById('prod-pin').value = '';
                document.getElementById('prod-qty').value = '';
            }
        } catch(e) {}
    }
</script>

<script src="js/kitchen.js"></script>
<script src="/core.js"></script>
</body>
</html>
