<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meseros - Taquería Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container pb-5 mb-5">
    <header class="text-center py-4">
        <h2 class="fw-bold text-dark">TAQUERÍA <span class="text-primary">POS</span></h2>
        <p class="text-muted small">Terminal de Comandas Móvil</p>
    </header>
    
    <div id="view-mesas">
        <h5 class="mb-3 fw-bold text-secondary text-uppercase">Seleccione una Mesa</h5>
        <div id="lista-mesas" class="row g-3">
            </div>
    </div>

    <div id="view-menu" style="display: none;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <button class="btn btn-light border-0 shadow-sm" onclick="irAMesas()">⬅ Volver</button>
            <h4 class="mb-0 fw-bold">Mesa #<span id="label-mesa"></span></h4>
        </div>
        <div id="grid-productos" class="row g-3">
            </div>
    </div>
</div>

<div id="bar-pedido" class="sticky-bottom-bar" style="display: none;">
    <div class="d-flex justify-content-between align-items-center container">
        <div class="lh-1">
            <div class="small text-muted">Seleccionados</div>
            <div class="h4 mb-0 fw-bold"><span id="cart-count">0</span> productos</div>
        </div>
        <button id="btn-enviar" class="btn btn-primary btn-lg px-5 fw-bold rounded-pill" onclick="confirmarPedido()">
            <i class="fa-solid fa-paper-plane me-2"></i> ENVIAR A COCINA
        </button>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
